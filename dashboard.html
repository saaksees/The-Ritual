<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>The Ritual — Insights</title><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}:root{--gold:#C9A84C;--gold-light:#E8D5A3;--gold-dark:#8B6914;--navy:#0A0E1A;--navy2:#111827;--navy3:#1C2537;--text:#F5F0E8;--text-muted:#A89F8C;--text-dim:#6B6356;--border:rgba(201,168,76,0.2);--border-strong:rgba(201,168,76,0.5);}body{background:var(--navy);color:var(--text);font-family:'Georgia',serif;min-height:100vh;padding:2rem 1rem}header{text-align:center;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}.eyebrow{font-size:.68rem;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:.75rem}h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:400;letter-spacing:.08em;margin-bottom:.5rem}.subtitle{color:var(--text-muted);font-style:italic;font-size:.95rem}.back-link{display:inline-block;margin-top:1rem;font-size:.78rem;color:var(--gold);text-decoration:none;letter-spacing:.15em;border-bottom:1px solid var(--border-strong);padding-bottom:1px}.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;max-width:900px;margin:0 auto 3rem}.stat-card{background:rgba(255,255,255,.02);border:1px solid var(--border);padding:1.5rem;text-align:center}.stat-num{font-size:2.5rem;color:var(--gold);letter-spacing:-.02em;margin-bottom:.3rem}.stat-label{font-size:.7rem;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase}.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.5rem;max-width:1100px;margin:0 auto 3rem}.chart-card{background:rgba(255,255,255,.02);border:1px solid var(--border);padding:1.75rem}.chart-title{font-size:.68rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:1.5rem}.chart-wrap{position:relative;height:260px}.products-section{max-width:1100px;margin:0 auto}.section-label{font-size:.68rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}.product-row{display:flex;align-items:center;gap:1rem;padding:.85rem 0;border-bottom:1px solid rgba(255,255,255,.04)}.product-rank{font-size:1.4rem;color:var(--text-dim);min-width:2.5rem;font-style:italic}.product-info{flex:1}.product-name{font-size:.95rem;color:var(--text);margin-bottom:.2rem}.product-brand{font-size:.72rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase}.product-bar-wrap{width:140px}.product-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}.product-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));border-radius:2px;transition:width .8s ease}.product-count{font-size:.75rem;color:var(--text-dim);margin-top:.3rem;text-align:right}.loading{text-align:center;padding:4rem;color:var(--text-muted);font-style:italic}.empty{text-align:center;padding:2rem;color:var(--text-dim);font-style:italic;font-size:.9rem}</style></head><body>
<header><div class="eyebrow">The Ritual</div><h1>Skin Insights</h1><p class="subtitle">Live data from every ritual consultation</p><a class="back-link" href="/">← Back to The Ritual</a></header>
<div id="content"><div class="loading">Loading insights…</div></div>
<script>
const SUPABASE_URL = 'https://phoyiuuhpkmtculpqbpj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kz44OMVJnt1-mEcSiR197Q_DwWGmDYU';

async function fetchData() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/quiz_responses?select=*&limit=1000`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json'
    }
  });
  if (!res.ok) throw new Error(`Supabase error: ${res.status} ${await res.text()}`);
  return res.json();
}

function count(arr, key) {
  const counts = {};
  arr.forEach(row => {
    const val = row[key];
    if (!val) return;
    if (Array.isArray(val)) val.forEach(v => { counts[v] = (counts[v]||0)+1 });
    else counts[val] = (counts[val]||0)+1;
  });
  return counts;
}

function topN(obj, n) { return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n); }

function goldPalette(n) {
  const base=['#C9A84C','#8B6914','#E8D5A3','#6B5012','#D4A843','#A07820','#F0E0B0','#705510'];
  return Array.from({length:n},(_,i)=>base[i%base.length]);
}

function makeChart(id, type, labels, data) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type,
    data: { labels, datasets: [{ data, backgroundColor: goldPalette(labels.length), borderColor:'rgba(10,14,26,0.8)', borderWidth:2, borderRadius: type==='bar'?3:0 }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: { display: type!=='bar', labels:{ color:'#A89F8C', font:{family:'Georgia',size:11}, padding:16, boxWidth:12 } },
        tooltip: { backgroundColor:'#111827', borderColor:'rgba(201,168,76,0.3)', borderWidth:1, titleColor:'#C9A84C', bodyColor:'#A89F8C', titleFont:{family:'Georgia'}, bodyFont:{family:'Georgia'} }
      },
      scales: type==='bar' ? {
        x:{ ticks:{color:'#6B6356',font:{family:'Georgia',size:10}}, grid:{color:'rgba(255,255,255,.04)'} },
        y:{ ticks:{color:'#6B6356',font:{family:'Georgia',size:10}}, grid:{color:'rgba(255,255,255,.04)'}, beginAtZero:true }
      } : {},
      cutout: type==='doughnut'?'65%':undefined
    }
  });
}

function countProducts(rows) {
  const counts = {};
  rows.forEach(row => {
    const prods = row.recommended_products;
    if (!Array.isArray(prods)) return;
    prods.forEach(p => {
      if (!p.product) return;
      const key = `${p.product}|||${p.brand||''}`;
      counts[key] = (counts[key]||0)+1;
    });
  });
  return counts;
}

async function init() {
  try {
    const rows = await fetchData();
    if (!rows.length) {
      document.getElementById('content').innerHTML = '<div class="empty">No data yet — take the quiz to see insights appear here!</div>';
      return;
    }
    const skinTypes = count(rows,'skin_type');
    const concerns = count(rows,'concerns');
    const budgets = count(rows,'budget');
    const lifestyles = count(rows,'lifestyle');
    const productCounts = countProducts(rows);
    const topProducts = topN(productCounts,8);
    const maxProd = topProducts[0]?.[1]||1;

    document.getElementById('content').innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num">${rows.length}</div><div class="stat-label">Total Consultations</div></div>
        <div class="stat-card"><div class="stat-num">${Object.keys(skinTypes).length}</div><div class="stat-label">Skin Types Seen</div></div>
        <div class="stat-card"><div class="stat-num">${Object.keys(concerns).length}</div><div class="stat-label">Unique Concerns</div></div>
        <div class="stat-card"><div class="stat-num">${Object.keys(productCounts).length}</div><div class="stat-label">Products Recommended</div></div>
      </div>
      <div class="charts-grid">
        <div class="chart-card"><div class="chart-title">Skin Type Distribution</div><div class="chart-wrap"><canvas id="skinChart"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">Top Skin Concerns</div><div class="chart-wrap"><canvas id="concernChart"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">Budget Distribution</div><div class="chart-wrap"><canvas id="budgetChart"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">Lifestyle Factors</div><div class="chart-wrap"><canvas id="lifestyleChart"></canvas></div></div>
      </div>
      <div class="products-section">
        <div class="section-label">Most Recommended Products</div>
        ${topProducts.map(([key,cnt],i)=>{
          const [name,brand]=key.split('|||');
          return `<div class="product-row">
            <div class="product-rank">${i+1}</div>
            <div class="product-info"><div class="product-name">${name}</div><div class="product-brand">${brand}</div></div>
            <div class="product-bar-wrap">
              <div class="product-bar"><div class="product-bar-fill" style="width:${Math.round((cnt/maxProd)*100)}%"></div></div>
              <div class="product-count">${cnt} recommendation${cnt>1?'s':''}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;

    makeChart('skinChart','doughnut',topN(skinTypes,6).map(x=>x[0]),topN(skinTypes,6).map(x=>x[1]));
    makeChart('concernChart','bar',topN(concerns,6).map(x=>x[0].length>18?x[0].slice(0,18)+'…':x[0]),topN(concerns,6).map(x=>x[1]));
    makeChart('budgetChart','doughnut',topN(budgets,5).map(x=>x[0]),topN(budgets,5).map(x=>x[1]));
    makeChart('lifestyleChart','bar',topN(lifestyles,6).map(x=>x[0].length>20?x[0].slice(0,20)+'…':x[0]),topN(lifestyles,6).map(x=>x[1]));
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty">Error loading data: ${e.message}</div>`;
  }
}
init();
</script>
</body></html>
