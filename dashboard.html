<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>The Ritual — Insights</title><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}:root{--gold:#C9A84C;--gold-light:#E8D5A3;--gold-dark:#8B6914;--navy:#0A0E1A;--navy2:#111827;--navy3:#1C2537;--text:#F5F0E8;--text-muted:#A89F8C;--text-dim:#6B6356;--border:rgba(201,168,76,0.2);--border-strong:rgba(201,168,76,0.5);}
body{background:var(--navy);color:var(--text);font-family:'Georgia',serif;min-height:100vh;padding:2rem 1rem}
header{text-align:center;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
.eyebrow{font-size:.68rem;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:.75rem}
h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:400;letter-spacing:.08em;margin-bottom:.5rem}
.subtitle{color:var(--text-muted);font-style:italic;font-size:.95rem}
.back-link{display:inline-block;margin-top:1rem;font-size:.78rem;color:var(--gold);text-decoration:none;letter-spacing:.15em;border-bottom:1px solid var(--border-strong);padding-bottom:1px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;max-width:1100px;margin:0 auto 2rem}
.stat-card{background:rgba(255,255,255,.02);border:1px solid var(--border);padding:1.5rem;text-align:center}
.stat-num{font-size:2.5rem;color:var(--gold);letter-spacing:-.02em;margin-bottom:.3rem}
.stat-label{font-size:.7rem;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase}
.stat-desc{font-size:.68rem;color:var(--text-dim);margin-top:.4rem;line-height:1.5;font-style:italic}
.summary-box{max-width:1100px;margin:0 auto 2.5rem;border:1px solid var(--border-strong);background:rgba(201,168,76,.04);padding:2rem 2.5rem}
.summary-eyebrow{font-size:.65rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:.75rem}
.summary-box p{color:var(--text-muted);font-size:1rem;line-height:2;font-style:italic}
.summary-box strong{color:var(--text);font-style:normal;font-weight:400}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.5rem;max-width:1100px;margin:0 auto 2rem}
.chart-card{background:rgba(255,255,255,.02);border:1px solid var(--border);padding:1.75rem}
.chart-card.wide{grid-column:1/-1}
.chart-title{font-size:.68rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:.4rem}
.chart-subtitle{font-size:.78rem;color:var(--text-dim);margin-bottom:1.25rem;line-height:1.6;font-style:italic}
.chart-wrap{position:relative;height:260px}
.chart-wrap.tall{height:320px}
.chart-insight{font-size:.72rem;color:var(--text-dim);margin-top:1rem;padding-top:.75rem;border-top:1px solid var(--border);font-style:italic}
.products-section{max-width:1100px;margin:2rem auto 0}
.section-label{font-size:.68rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:.75rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.section-desc{font-size:.85rem;color:var(--text-muted);font-style:italic;line-height:1.8;margin-bottom:1.5rem}
.product-row{display:flex;align-items:center;gap:1rem;padding:.85rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.product-rank{font-size:1.4rem;color:var(--text-dim);min-width:2.5rem;font-style:italic}
.product-info{flex:1}
.product-name{font-size:.95rem;color:var(--text);margin-bottom:.2rem}
.product-brand{font-size:.72rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase}
.product-bar-wrap{width:140px}
.product-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.product-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));border-radius:2px;transition:width .8s ease}
.product-count{font-size:.75rem;color:var(--text-dim);margin-top:.3rem;text-align:right}
.loading{text-align:center;padding:4rem;color:var(--text-muted);font-style:italic}
.empty{text-align:center;padding:2rem;color:var(--text-dim);font-style:italic;font-size:.9rem}
.dashboard-footer{max-width:1100px;margin:3rem auto 1rem;padding-top:2rem;border-top:1px solid var(--border);text-align:center;color:var(--text-dim);font-size:.8rem;font-style:italic;line-height:1.9}.executive-summary{max-width:1100px;margin:0 auto 3rem;background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.02));border:1px solid var(--border-strong);padding:2.5rem;box-shadow:0 4px 16px rgba(0,0,0,.2)}.exec-title{font-size:.7rem;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:1.25rem;text-align:center}.exec-text{font-size:1.05rem;color:var(--text);line-height:2;text-align:center;font-style:italic}.insight-card{background:rgba(255,255,255,.02);border:1px solid var(--border);padding:1.5rem 1.75rem;margin-bottom:1rem;transition:border-color .2s}.insight-card:hover{border-color:var(--border-strong)}.insight-icon{font-size:1.2rem;margin-bottom:.75rem}.insight-text{font-size:.9rem;color:var(--text-muted);line-height:1.85}.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;max-width:1100px;margin:0 auto 2.5rem}.kpi-card{background:rgba(255,255,255,.02);border:1px solid var(--border);padding:1.5rem;text-align:center}.kpi-value{font-size:2rem;color:var(--gold);margin-bottom:.5rem}.kpi-label{font-size:.7rem;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase}.btn-generate{background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;color:var(--navy);padding:1rem 2.5rem;font-family:'Georgia',serif;font-size:.85rem;letter-spacing:.15em;cursor:pointer;transition:all .3s;text-transform:uppercase;margin:2rem auto;display:block;box-shadow:0 4px 12px rgba(201,168,76,.3)}.btn-generate:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,.4)}.insights-loading{text-align:center;padding:2rem;color:var(--text-muted);font-style:italic}.matrix-table{width:100%;border-collapse:collapse;margin:1.5rem 0}.matrix-table th,.matrix-table td{padding:.85rem 1rem;border:1px solid var(--border);text-align:left;font-size:.85rem}.matrix-table th{background:rgba(201,168,76,.08);color:var(--gold);font-weight:400;letter-spacing:.1em;text-transform:uppercase;font-size:.7rem}.matrix-table td{color:var(--text-muted)}
</style></head><body>
<header><div class="eyebrow">The Ritual</div><h1>Skin Insights</h1><p class="subtitle">Live data from every ritual consultation</p><a class="back-link" href="/">← Back to The Ritual</a></header>
<div id="content"><div class="loading">Loading insights…</div></div>
<script>
const SUPABASE_URL = 'https://phoyiuuhpkmtculpqbpj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kz44OMVJnt1-mEcSiR197Q_DwWGmDYU';

async function fetchData() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/quiz_responses?select=*&limit=1000&order=created_at.asc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }
  });
  if (!res.ok) throw new Error(`Supabase error: ${res.status} ${await res.text()}`);
  return res.json();
}

function count(arr, key) {
  const counts = {};
  arr.forEach(row => {
    const val = row[key];
    if (!val) return;
    if (Array.isArray(val)) val.forEach(v => { counts[v] = (counts[v]||0)+1 });
    else counts[val] = (counts[val]||0)+1;
  });
  return counts;
}

function topN(obj, n) { return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n); }

function goldPalette(n) {
  const base=['#C9A84C','#8B6914','#E8D5A3','#6B5012','#D4A843','#A07820','#F0E0B0','#705510'];
  return Array.from({length:n},(_,i)=>base[i%base.length]);
}

function makeChart(id, type, labels, data, extraOpts={}) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type,
    data: { labels, datasets: [{ data, backgroundColor: extraOpts.singleColor ? extraOpts.singleColor : goldPalette(labels.length), borderColor:'rgba(10,14,26,0.8)', borderWidth:2, borderRadius: type==='bar'?3:0, fill: extraOpts.fill||false, tension: 0.4, pointBackgroundColor:'#C9A84C', pointRadius: 4, ...extraOpts.dataset }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: { display: type==='doughnut', labels:{ color:'#A89F8C', font:{family:'Georgia',size:11}, padding:16, boxWidth:12 } },
        tooltip: { backgroundColor:'#111827', borderColor:'rgba(201,168,76,0.3)', borderWidth:1, titleColor:'#C9A84C', bodyColor:'#A89F8C', titleFont:{family:'Georgia'}, bodyFont:{family:'Georgia'} }
      },
      scales: (type==='bar'||type==='line') ? {
        x:{ ticks:{color:'#6B6356',font:{family:'Georgia',size:10}}, grid:{color:'rgba(255,255,255,.04)'} },
        y:{ ticks:{color:'#6B6356',font:{family:'Georgia',size:10}}, grid:{color:'rgba(255,255,255,.04)'}, beginAtZero:true }
      } : {},
      cutout: type==='doughnut'?'65%':undefined,
      ...extraOpts.chartOptions
    }
  });
}

function countProducts(rows) {
  const counts = {};
  rows.forEach(row => {
    const prods = row.recommended_products;
    if (!Array.isArray(prods)) return;
    prods.forEach(p => {
      if (!p.product) return;
      const key = `${p.product}|||${p.brand||''}|||${p.is_kbeauty?'k':'in'}`;
      counts[key] = (counts[key]||0)+1;
    });
  });
  return counts;
}

function countIngredients(rows) {
  const counts = {};
  rows.forEach(row => {
    const prods = row.recommended_products;
    if (!Array.isArray(prods)) return;
    prods.forEach(p => {
      if (!Array.isArray(p.key_actives)) return;
      p.key_actives.forEach(ing => { counts[ing] = (counts[ing]||0)+1 });
    });
  });
  return counts;
}

function consultationsPerDay(rows) {
  const counts = {};
  rows.forEach(row => {
    const day = row.created_at ? row.created_at.slice(0,10) : 'unknown';
    counts[day] = (counts[day]||0)+1;
  });
  const sorted = Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0]));
  return { labels: sorted.map(x=>x[0].slice(5)), data: sorted.map(x=>x[1]) };
}

function kbeautySplit(rows) {
  let k=0, indian=0;
  rows.forEach(row => {
    const prods = row.recommended_products;
    if (!Array.isArray(prods)) return;
    prods.forEach(p => { p.is_kbeauty ? k++ : indian++ });
  });
  return { k, indian };
}

function analyzeAgeConcerns(rows){const matrix={};rows.forEach(r=>{const age=r.age_group||'Unknown';if(!matrix[age])matrix[age]={};(r.concerns||[]).forEach(c=>{matrix[age][c]=(matrix[age][c]||0)+1;});});return matrix;}

function analyzeCityConcerns(rows){const matrix={};rows.forEach(r=>{const city=r.city||'Unknown';if(!matrix[city])matrix[city]={};(r.concerns||[]).forEach(c=>{matrix[city][c]=(matrix[city][c]||0)+1;});});return matrix;}

function analyzeIngredientPenetration(rows){const ingredientCounts={};const totalRoutines=rows.length;rows.forEach(r=>{const ingredients=new Set();(r.recommended_products||[]).forEach(p=>{(p.key_actives||[]).forEach(ing=>ingredients.add(ing.toLowerCase()));});ingredients.forEach(ing=>{ingredientCounts[ing]=(ingredientCounts[ing]||0)+1;});});const penetration={};Object.entries(ingredientCounts).forEach(([ing,cnt])=>{penetration[ing]=Math.round((cnt/totalRoutines)*100);});return penetration;}

async function generateMarketInsights(stats){const prompt=`Analyze these skincare consultation statistics and generate 6 executive business intelligence insights for the Indian skincare market:
Total: ${stats.total}, Ages: ${JSON.stringify(stats.ages)}, Cities: ${JSON.stringify(stats.cities)}, Concerns: ${JSON.stringify(stats.concerns)}, K-Beauty: ${stats.kbeautyPct}%
Return as JSON array: ["insight1","insight2",...]`;try{const res=await fetch('/api/recommend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,answers:{},is_chat:true})});const data=await res.json();let text=data.content?.map(c=>c.text||'').join('').trim().replace(/```json|```/g,'').trim();const start=text.indexOf('[');const end=text.lastIndexOf(']');if(start!==-1&&end!==-1)text=text.substring(start,end+1);return JSON.parse(text);}catch(e){return["Unable to generate insights."];}}

async function loadMarketInsights() {
  const btn = event.target;
  const container = document.getElementById('marketInsights');
  btn.disabled = true;
  btn.textContent = 'Generating Insights...';
  container.innerHTML = '<div class="insights-loading">✨ AI is analyzing your data...</div>';
  
  try {
    const insights = await generateMarketInsights(window._dashboardStats);
    let html = '<div style="display:grid;gap:1rem;margin-top:1.5rem">';
    insights.forEach((insight, i) => {
      const icons = ['💡','📊','🎯','✨','🔍','💰','🌟','📈'];
      html += `<div class="insight-card">
        <div class="insight-icon">${icons[i%icons.length]}</div>
        <div class="insight-text">${insight}</div>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
    btn.textContent = 'Refresh Insights';
  } catch(e) {
    container.innerHTML = '<div class="empty">Failed to generate insights. Try again.</div>';
    btn.textContent = 'Try Again';
  } finally {
    btn.disabled = false;
  }
}

async function init() {
  try {
    const rows = await fetchData();
    if (!rows.length) {
      document.getElementById('content').innerHTML = '<div class="empty">No data yet — take the quiz to see insights appear here!</div>';
      return;
    }

    const skinTypes = count(rows,'skin_type');
    const concerns = count(rows,'concerns');
    const budgets = count(rows,'budget');
    const lifestyles = count(rows,'lifestyle');
    const ages = count(rows,'age_group');
    const cities = count(rows,'city');
    const productCounts = countProducts(rows);
    const ingredientCounts = countIngredients(rows);
    const topProducts = topN(productCounts,8);
    const topIngredients = topN(ingredientCounts,8);
    const maxProd = topProducts[0]?.[1]||1;
    const daily = consultationsPerDay(rows);
    const split = kbeautySplit(rows);

    const topConcern = topN(concerns,1)[0]?.[0] || 'pigmentation';
    const topSkin = topN(skinTypes,1)[0]?.[0] || 'combination';
    const topBudget = topN(budgets,1)[0]?.[0] || 'mid-range';
    const kPct = Math.round((split.k/(split.k+split.indian||1))*100);

    document.getElementById('content').innerHTML = `

      <div class="stats-row">
        <div class="stat-card"><div class="stat-num">${rows.length}</div><div class="stat-label">Total Consultations</div><div class="stat-desc">People who completed the full quiz</div></div>
        <div class="stat-card"><div class="stat-num">${Object.keys(skinTypes).length}</div><div class="stat-label">Skin Types Seen</div><div class="stat-desc">Distinct skin types identified so far</div></div>
        <div class="stat-card"><div class="stat-num">${Object.keys(concerns).length}</div><div class="stat-label">Unique Concerns</div><div class="stat-desc">Different skin problems reported</div></div>
        <div class="stat-card"><div class="stat-num">${Object.keys(productCounts).length}</div><div class="stat-label">Products Recommended</div><div class="stat-desc">Unique products suggested across all rituals</div></div>
        <div class="stat-card"><div class="stat-num">${kPct}%</div><div class="stat-label">K-Beauty Share</div><div class="stat-desc">Of all recommended products are Korean brands</div></div>
      </div>

      <div class="summary-box">
        <div class="summary-eyebrow">What This Tells Us</div>
        <p>Most people who've taken The Ritual have <strong>${topSkin.toLowerCase()}</strong> skin, and their biggest concern is <strong>${topConcern.toLowerCase()}</strong>. The majority are spending <strong>${topBudget}</strong> on skincare monthly. Interestingly, <strong>${kPct}% of recommended products</strong> are K-beauty — showing how deeply Korean skincare has entered the Indian market. ${rows.length < 10 ? "We're still early — share The Ritual to build richer insights!" : "With " + rows.length + " consultations, clear patterns are starting to emerge."}</p>
      </div>

      <div class="charts-grid">
        <div class="chart-card wide">
          <div class="chart-title">Consultations Per Day</div>
          <div class="chart-subtitle">How many people took the quiz each day — showing growth over time</div>
          <div class="chart-wrap tall"><canvas id="dailyChart"></canvas></div>
          <div class="chart-insight">💡 Each point is one day — a rising trend means more people are discovering The Ritual</div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Skin Type Distribution</div>
          <div class="chart-subtitle">Which skin types are most common among our users</div>
          <div class="chart-wrap"><canvas id="skinChart"></canvas></div>
          <div class="chart-insight">💡 The bigger the slice, the more common that skin type is among our users</div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Top Skin Concerns</div>
          <div class="chart-subtitle">The most frequently reported skin problems — what Indian skin struggles with most</div>
          <div class="chart-wrap"><canvas id="concernChart"></canvas></div>
          <div class="chart-insight">💡 Taller bars = more people reported this concern. Use this to understand what matters most to Indian skin</div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Budget Distribution</div>
          <div class="chart-subtitle">How much users are willing to spend on their skincare monthly</div>
          <div class="chart-wrap"><canvas id="budgetChart"></canvas></div>
          <div class="chart-insight">💡 Shows the price sensitivity of our audience — useful for understanding which products to prioritise recommending</div>
        </div>
        <div class="chart-card">
          <div class="chart-title">K-Beauty vs Indian Brands</div>
          <div class="chart-subtitle">The split between Korean and Indian products in our recommendations</div>
          <div class="chart-wrap"><canvas id="kbeautyChart"></canvas></div>
          <div class="chart-insight">💡 Pink = K-beauty (COSRX, Laneige etc.), Gold = Indian brands (Minimalist, Dot & Key etc.)</div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Lifestyle Factors</div>
          <div class="chart-subtitle">Daily habits that are impacting skin health — stress, sleep, diet, and environment</div>
          <div class="chart-wrap"><canvas id="lifestyleChart"></canvas></div>
          <div class="chart-insight">💡 The most common lifestyle factor affecting Indian skin — often a bigger driver than skin type alone</div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Most Recommended Ingredients</div>
          <div class="chart-subtitle">The active ingredients our AI recommends most often for Indian skin</div>
          <div class="chart-wrap"><canvas id="ingredientChart"></canvas></div>
          <div class="chart-insight">💡 These are the powerhouse ingredients showing up again and again — a snapshot of what Indian skin needs most</div>
        </div>
      </div>

      <div id="enhancedAnalytics">
        
        <div class="charts-grid" style="margin-top:3rem">
          <div class="chart-card">
            <div class="chart-title">Age Distribution</div>
            <div class="chart-subtitle">Which age groups are using The Ritual most</div>
            <div class="chart-wrap"><canvas id="ageChart"></canvas></div>
            <div class="chart-insight" id="ageInsight">💡 Loading insight...</div>
          </div>
          <div class="chart-card">
            <div class="chart-title">Top Cities</div>
            <div class="chart-subtitle">Geographic distribution of our users across India</div>
            <div class="chart-wrap"><canvas id="cityChart"></canvas></div>
            <div class="chart-insight" id="cityInsight">💡 Loading insight...</div>
          </div>
        </div>

        <div style="max-width:1100px;margin:3rem auto;text-align:center;background:rgba(255,255,255,.02);border:1px solid var(--border);padding:3rem 2rem">
          <div class="eyebrow" style="margin-bottom:1rem">Ritual Consumer Intelligence™</div>
          <p style="color:var(--text-muted);font-size:.95rem;margin-bottom:2rem;font-style:italic">AI-powered business insights from your consultation data</p>
          <button class="btn-generate" onclick="loadMarketInsights()">Generate Market Insights</button>
          <div id="marketInsights" style="margin-top:2rem"></div>
        </div>

        <div style="max-width:1100px;margin:3rem auto">
          <div class="section-label">Age × Concern Analysis</div>
          <p class="section-desc">Which skin concerns dominate each age group — showing how priorities shift over time</p>
          <div id="ageConcernMatrix"></div>
        </div>

        <div style="max-width:1100px;margin:3rem auto">
          <div class="section-label">City × Concern Analysis</div>
          <p class="section-desc">How geography influences skin problems — humidity, pollution, and climate at play</p>
          <div id="cityConcernMatrix"></div>
        </div>

        <div style="max-width:1100px;margin:3rem auto">
          <div class="section-label">Ingredient Penetration</div>
          <p class="section-desc">What percentage of all routines include each ingredient — the market leaders</p>
          <div id="ingredientPenetration"></div>
        </div>

        <div class="kpi-grid" style="margin-top:3rem">
          <div class="kpi-card">
            <div class="kpi-value" id="avgConcerns">-</div>
            <div class="kpi-label">Avg Concerns Selected</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="avgProducts">-</div>
            <div class="kpi-label">Avg Products Recommended</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="topLifestyle">-</div>
            <div class="kpi-label">Top Lifestyle Factor</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="topSkinKPI">-</div>
            <div class="kpi-label">Most Common Skin Type</div>
          </div>
        </div>

      </div>

      <div class="products-section">
        <div class="section-label">Most Recommended Products</div>
        <p class="section-desc">These are the products our AI has recommended most across all consultations — a crowdsourced view of what works best for Indian skin.</p>
        ${topProducts.map(([key,cnt],i)=>{
          const [name,brand,type]=key.split('|||');
          return `<div class="product-row">
            <div class="product-rank">${i+1}</div>
            <div class="product-info">
              <div class="product-name">${name} ${type==='k'?'<span style="font-size:.65rem;color:#ffb6c1;border:1px solid rgba(255,182,193,.3);padding:.1rem .4rem;margin-left:.3rem">K-BEAUTY</span>':''}</div>
              <div class="product-brand">${brand}</div>
            </div>
            <div class="product-bar-wrap">
              <div class="product-bar"><div class="product-bar-fill" style="width:${Math.round((cnt/maxProd)*100)}%"></div></div>
              <div class="product-count">${cnt} recommendation${cnt>1?'s':''}</div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="dashboard-footer">
        <p>Data is anonymous — no personal information is stored. Every consultation contributes to building a richer picture of Indian skin. ✦</p>
        <a href="/" class="back-link" style="margin-top:.75rem;display:inline-block">← Take the quiz and add your data</a>
      </div>`;

    makeChart('dailyChart','line', daily.labels, daily.data, {
      singleColor: 'rgba(201,168,76,0.15)',
      dataset: { borderColor:'#C9A84C', backgroundColor:'rgba(201,168,76,0.08)', fill:true, borderWidth:2 }
    });
    makeChart('skinChart','doughnut',topN(skinTypes,6).map(x=>x[0]),topN(skinTypes,6).map(x=>x[1]));
    makeChart('concernChart','bar',topN(concerns,6).map(x=>x[0].length>18?x[0].slice(0,18)+'…':x[0]),topN(concerns,6).map(x=>x[1]));
    makeChart('budgetChart','doughnut',topN(budgets,5).map(x=>x[0]),topN(budgets,5).map(x=>x[1]));
    makeChart('kbeautyChart','doughnut',['K-Beauty','Indian Brands'],[split.k, split.indian],{ singleColor:['#ffb6c1','#C9A84C'] });
    makeChart('lifestyleChart','bar',topN(lifestyles,6).map(x=>x[0].length>20?x[0].slice(0,20)+'…':x[0]),topN(lifestyles,6).map(x=>x[1]));
    makeChart('ingredientChart','bar',topIngredients.map(x=>x[0].length>18?x[0].slice(0,18)+'…':x[0]),topIngredients.map(x=>x[1]));

    // Enhanced Analytics - Age Distribution
    const topAges = topN(ages,5);
    if(topAges.length) {
      makeChart('ageChart','bar',topAges.map(x=>x[0]||'Unknown'),topAges.map(x=>x[1]));
      const largestAge = topAges[0];
      const agePct = Math.round((largestAge[1]/rows.length)*100);
      document.getElementById('ageInsight').textContent = `💡 Users aged ${largestAge[0]||'Unknown'} account for ${agePct}% of all consultations`;
    }

    // Enhanced Analytics - City Distribution
    const topCities = topN(cities,7);
    if(topCities.length) {
      makeChart('cityChart','bar',topCities.map(x=>x[0]||'Unknown'),topCities.map(x=>x[1]));
      const topCity = topCities[0];
      const cityPct = Math.round((topCity[1]/rows.length)*100);
      document.getElementById('cityInsight').textContent = `💡 ${topCity[0]||'Unknown'} contributes ${cityPct}% of all consultations`;
    }

    // Age × Concern Matrix
    const ageConcernData = analyzeAgeConcerns(rows);
    let ageConcernHTML = '<table class="matrix-table"><thead><tr><th>Age Group</th><th>Most Common Concern</th><th>Count</th></tr></thead><tbody>';
    Object.entries(ageConcernData).forEach(([age, concernObj]) => {
      const topConcernEntry = Object.entries(concernObj).sort((a,b)=>b[1]-a[1])[0];
      if(topConcernEntry) {
        ageConcernHTML += `<tr><td>${age}</td><td>${topConcernEntry[0]}</td><td>${topConcernEntry[1]}</td></tr>`;
      }
    });
    ageConcernHTML += '</tbody></table>';
    document.getElementById('ageConcernMatrix').innerHTML = ageConcernHTML;

    // City × Concern Matrix
    const cityConcernData = analyzeCityConcerns(rows);
    let cityConcernHTML = '<table class="matrix-table"><thead><tr><th>City</th><th>Most Common Concern</th><th>Count</th></tr></thead><tbody>';
    const topCitiesForMatrix = Object.entries(cityConcernData).sort((a,b)=>{
      const aMax = Math.max(...Object.values(a[1]));
      const bMax = Math.max(...Object.values(b[1]));
      return bMax - aMax;
    }).slice(0,10);
    topCitiesForMatrix.forEach(([city, concernObj]) => {
      const topConcernEntry = Object.entries(concernObj).sort((a,b)=>b[1]-a[1])[0];
      if(topConcernEntry) {
        cityConcernHTML += `<tr><td>${city}</td><td>${topConcernEntry[0]}</td><td>${topConcernEntry[1]}</td></tr>`;
      }
    });
    cityConcernHTML += '</tbody></table>';
    document.getElementById('cityConcernMatrix').innerHTML = cityConcernHTML;

    // Ingredient Penetration
    const penetration = analyzeIngredientPenetration(rows);
    const topPenetration = Object.entries(penetration).sort((a,b)=>b[1]-a[1]).slice(0,10);
    let penetrationHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-top:1.5rem">';
    topPenetration.forEach(([ing, pct]) => {
      penetrationHTML += `<div style="background:rgba(255,255,255,.02);border:1px solid var(--border);padding:1.25rem;text-align:center">
        <div style="font-size:2rem;color:var(--gold);margin-bottom:.5rem">${pct}%</div>
        <div style="font-size:.8rem;color:var(--text-muted);text-transform:capitalize">${ing}</div>
      </div>`;
    });
    penetrationHTML += '</div>';
    document.getElementById('ingredientPenetration').innerHTML = penetrationHTML;

    // Consultation Behavior KPIs
    const avgConcernsCount = rows.reduce((sum,r)=>(r.concerns||[]).length+sum,0)/rows.length;
    const avgProductsCount = rows.reduce((sum,r)=>(r.recommended_products||[]).length+sum,0)/rows.length;
    const topLifestyleEntry = topN(lifestyles,1)[0];
    document.getElementById('avgConcerns').textContent = avgConcernsCount.toFixed(1);
    document.getElementById('avgProducts').textContent = avgProductsCount.toFixed(1);
    document.getElementById('topLifestyle').textContent = topLifestyleEntry?.[0]?.slice(0,15) || 'N/A';
    document.getElementById('topSkinKPI').textContent = topSkin.slice(0,12);

    // Store stats globally for market insights
    window._dashboardStats = { total: rows.length, ages: Object.fromEntries(topN(ages,5)), cities: Object.fromEntries(topN(cities,7)), concerns: Object.fromEntries(topN(concerns,6)), kbeautyPct: kPct };

  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty">Error loading data: ${e.message}</div>`;
  }
}
init();
</script>
</body></html>
